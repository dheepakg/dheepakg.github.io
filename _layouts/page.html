---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

    <div class="post-read">{{ time }} {% if time == '1' %}minute{% else %}minutes{% endif %}  read </div>

  <div class="post-content">
    {{ content }}
  </div>

</article>
